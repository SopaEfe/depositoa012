<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Depósito A012 - Demo</title>
</head>
<body>

<h1>Depósito A012</h1>

<select id="cliente">
  <option>CONSUMIDOR FINAL</option>
  <option>Cliente Ejemplo</option>
</select>

<br><br>

<input type="text" id="cfExtra" placeholder="Nombre o referencia (opcional)" style="display:block;">

<h2>Productos (demo)</h2>

<ul id="productos"></ul>

<script>
const productos = [
  {codigo:"1134", nombre:"BIZCOCHUELO CHOCOLATE", bulto:25120, unidad:2512, stock:0},
  {codigo:"1133", nombre:"BIZCOCHUELO VAINILLA", bulto:25120, unidad:2512, stock:2}
];

const ul = document.getElementById("productos");

productos.forEach(p=>{
  const li = document.createElement("li");
  li.innerText = `${p.codigo} - ${p.nombre} | $${p.unidad}`;
  ul.appendChild(li);
});
</script>

</body>
</html>
